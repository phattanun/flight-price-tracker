name: Flight price tracker

# Runs on YOUR Mac (self-hosted runner) — VietJet works on your home IP.
# Setup once: scripts/SETUP-RUNNER.md

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python3 -m pip install -q -r requirements.txt
      - name: Run tracker
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 tracker.py --once
