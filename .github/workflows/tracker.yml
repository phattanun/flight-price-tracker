name: Flight price tracker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [run-tracker]

concurrency:
  group: flight-price-tracker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Log trigger
        run: echo "Triggered by ${{ github.event_name }} at $(date -u)"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python3 -m pip install -q -r requirements.txt

      - name: Run tracker
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SKIP_PLAYWRIGHT: "true"
        run: python3 tracker.py --once
