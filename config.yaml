slack_webhook_url: ""  # use SLACK_WEBHOOK_URL env (GitHub secret or .env locally)
check_interval_minutes: 30

rate_limit:
  min_delay_seconds: 3
  max_delay_seconds: 10
  max_retries: 3
  backoff_multiplier: 2.0

routes:
  - name: "HDY-BKK (Hat Yai→Bangkok)"
    from: HDY
    to: BKK
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_range_start: "2026-12-21"
    date_range_end: "2027-01-07"
    providers:
      google_flights: 1500

  - name: "HDY-DMK (Hat Yai→Bangkok)"
    from: HDY
    to: DMK
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_range_start: "2026-12-21"
    date_range_end: "2027-01-07"
    providers:
      google_flights: 1500

  - name: "SIN-BKK (SIN→Bangkok)"
    from: SIN
    to: BKK
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_range_start: "2026-12-21"
    date_range_end: "2027-01-07"
    providers:
      google_flights: 2600

  - name: "SIN-DMK (SIN→Bangkok)"
    from: SIN
    to: DMK
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_range_start: "2026-12-21"
    date_range_end: "2027-01-07"
    providers:
      google_flights: 2600

  # Round trip: Nov–Dec 2026 and Feb–May 2027 (10–16 day stay; return may be next month)
  - name: "SIN-KIX round trip"
    from: SIN
    to: KIX
    trip_type: round_trip
    trip_duration_min: 10
    trip_duration_max: 16
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_ranges:
      - start: "2026-11-15"
        end: "2026-12-15"
      - start: "2027-02-01"
        end: "2027-05-31"
    providers:
      google_flights: 9000
      vietjet: 500

  - name: "SIN-NRT round trip"
    from: SIN
    to: NRT
    trip_type: round_trip
    trip_duration_min: 10
    trip_duration_max: 16
    adults: 1
    children: 0
    infants: 0
    currency: thb
    date_ranges:
      - start: "2026-11-15"
        end: "2026-12-15"
      - start: "2027-02-01"
        end: "2027-05-31"
    providers:
      google_flights: 9000
      vietjet: 500

